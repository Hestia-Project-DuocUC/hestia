# ─────────────────────────────────────────────────────────────────────────────
# Hestia — nginx reverse proxy con TLS
#
# Requiere certificados en docker/nginx/certs/:
#   hestia.crt  (certificado, puede ser auto-firmado para LAN)
#   hestia.key  (clave privada)
#
# Generar certificado auto-firmado: ./generate-cert.sh
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Ocultar version de nginx en headers de error
    server_tokens off;

    # ── Redireccion HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/hestia.crt;
        ssl_certificate_key /etc/nginx/certs/hestia.key;

        # TLS 1.2 y 1.3 unicamente. 1.0 y 1.1 son obsoletos (OWASP A02:2021).
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_session_tickets off;

        # HSTS: fuerza HTTPS por 2 años en todos los subdominios (OWASP A05:2021)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── Rutas de API (FastAPI en puerto 8000) ────────────────────────────
        # Los prefijos registrados en FastAPI se enrutan directamente al
        # contenedor 'api', sin pasar por el proxy de Vite.
        location ~* ^/(auth|insumos|importar|resumen|salas|categorias|usuarios|movimientos|audit-log|solicitudes)(/|$) {
            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Frontend Vite React (puerto 3000) ────────────────────────────────
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket para Vite HMR en modo desarrollo
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
