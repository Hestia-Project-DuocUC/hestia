# ─────────────────────────────────────────────────────────────────────────────
# Hestia — Docker Compose
# Levanta tres servicios: PostgreSQL, FastAPI y el frontend Vite (React).
#
# Uso:
#   docker compose up          → levanta todo
#   docker compose up --build  → reconstruye imagenes y levanta
#   docker compose down        → apaga los contenedores
#   docker compose down -v     → apaga Y borra la base de datos (cuidado)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hestia_pass
      POSTGRES_DB: hestia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API FastAPI ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Frontend Vite (React) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # El proxy de Vite reenvía llamadas /api/* a este destino.
      # Dentro de Docker usamos el nombre del servicio 'api', no localhost.
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      # Volumen anonimo para node_modules: evita que la carpeta local
      # (compilada para el OS del host) sobreescriba los binarios del contenedor.
      - /app/node_modules

# ── Volumes persistentes ───────────────────────────────────────────────────
volumes:
  postgres_data:
