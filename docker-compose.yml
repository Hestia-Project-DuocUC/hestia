# ─────────────────────────────────────────────────────────────────────────────
# Hestia — Docker Compose
# Levanta cuatro servicios: PostgreSQL, FastAPI, el frontend Vite (React) y nginx.
#
# Uso:
#   ./generate-cert.sh         → genera certificado SSL (primera vez)
#   docker compose up --build  → construye imagenes y levanta todo
#   docker compose up          → levanta sin reconstruir
#   docker compose down        → apaga los contenedores
#   docker compose down -v     → apaga Y borra la base de datos (cuidado)
#
# Acceso:
#   https://<IP-LAN>   → nginx (HTTPS, recomendado)
#   http://<IP-LAN>    → redirige a HTTPS automaticamente
#
# En produccion se pueden comentar los puertos 8000 y 3000 del api y frontend
# para que solo nginx sea accesible desde la LAN.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hestia_pass
      POSTGRES_DB: hestia_db
    # Sin 'ports' aqui: la BD solo es alcanzable desde dentro de la red
    # interna de Docker (nombre de servicio 'db', puerto 5432).
    # Ningun dispositivo de la LAN puede conectarse directamente a PostgreSQL.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app

  # ── Frontend Vite (React) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # El proxy de Vite reenvia llamadas /api/* a este destino.
      # Dentro de Docker usamos el nombre del servicio 'api', no localhost.
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      # Volumen anonimo para node_modules: evita que la carpeta local
      # (compilada para el OS del host) sobreescriba los binarios del contenedor.
      - /app/node_modules

  # ── Nginx Reverse Proxy (HTTPS/TLS) ────────────────────────────────────
  # Requiere certificados en docker/nginx/certs/ (generar con ./generate-cert.sh)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

# ── Volumes persistentes ───────────────────────────────────────────────
volumes:
  postgres_data:
