name: Validación de código

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pip-audit

      - name: Verificar sintaxis con flake8
        run: |
          cd backend
          flake8 app/ --max-line-length=100 --exclude=__pycache__ --count --statistics

      - name: Escanear vulnerabilidades en dependencias Python
        run: pip-audit -r requirements.txt --progress-spinner=off

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias frontend
        run: cd frontend && npm ci

      - name: Escanear vulnerabilidades en dependencias frontend
        run: cd frontend && npm audit --audit-level=high
